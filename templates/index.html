<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreditCoach AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
</head>
<body>

<header class="nav" role="banner">
    <div class="nav-inner">
        <button class="nav-back" id="navBack" onclick="goBack()" style="display:none" aria-label="Back to paths">&#8592;</button>
        <a class="nav-brand" onclick="goHome()" style="cursor:pointer" role="button" aria-label="Go to home page">Credit<span class="nav-accent">Coach</span> <span class="nav-ai">AI</span></a>
        <div class="nav-center" id="thinkingBar" role="status" aria-live="polite"></div>
        <div class="nav-right">
            <div class="nav-agents" role="status" aria-label="Agent status">
                <div class="agent-pill" id="ap-score" aria-label="ScoreSimulator: idle"><span class="ap-dot"></span>Score</div>
                <div class="agent-pill" id="ap-action" aria-label="ActionPlan: idle"><span class="ap-dot"></span>Plan</div>
                <div class="agent-pill" id="ap-policy" aria-label="PolicyExplainer: idle"><span class="ap-dot"></span>Policy</div>
            </div>
            <button class="nav-btn" onclick="goHome()" aria-label="Start new conversation">+ New</button>
        </div>
    </div>
</header>

<main class="app" id="chat" role="main" aria-label="Chat area">
    <div class="app-inner" id="chatInner"></div>
</main>

<div class="input-bar" id="inputBar" style="display:none" role="region" aria-label="Message input">
    <div class="input-wrap">
        <label for="msgInput" class="sr-only">Type your credit question</label>
        <input id="msgInput" type="text" placeholder="Ask me anything about credit..." onkeydown="if(event.key==='Enter')sendMessage()" autocomplete="off" aria-label="Type your credit question">
        <button id="sendBtn" onclick="sendMessage()" aria-label="Send message"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
    </div>
    <div class="input-meta">Powered by IBM watsonx.ai &middot; Granite &middot; Multi-Agent RAG &middot; IBM SkillsBuild Hackathon 2026</div>
</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
